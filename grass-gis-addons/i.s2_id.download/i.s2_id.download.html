<!DOCTYPE html>
<h2>Description</h2>

<em>i.s2_id.download</em> Downloads S2 scene from Copernicus Data Space by given ID using eodag.


<h2>EXAMPLES</h2>

<div class="code"><pre>
i.s2_id.download s2_id=S2B_MSIL2A_20240109T103329_N0510_R108_T32ULB_20240109T114910 \
    download_dir=/home/data/ \
</pre></div>
